<div class="profile-card">
  <div class="profile-header">
    <h2>Personal Information</h2>
    <p>Update your personal details</p>
    <div class="avatar-wrapper">
      @if(userInfo()?.data?.picture){
        <img [src]="userInfo()?.data?.picture" alt="Avatar">
      } @else {
        <div class="placeholder-avatar">
          {{userInfo()?.data?.firstName?.charAt(0)}}
        </div>
      }
    </div>
  </div>

  <form [formGroup]="updateForm" (ngSubmit)="onSubmit()" class="profile-form">
    <div class="form-group">
      <label for="picture">Picture</label>
      <input type="text" id="picture" formControlName="picture">
    </div>

  
    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" formControlName="firstName" id="firstName">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" formControlName="lastName" id="lastName">
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" [value]="userInfo()?.data?.email" readonly class="readonly-input">
    </div>

    <div class="form-group">
      <label for="phoneNumber">Phone Number</label>
      <input type="text" id="phoneNumber" formControlName="phoneNumber">
    </div>

    <div class="form-group">
      <label for="address">Address</label>
      <textarea id="address" formControlName="address" rows="3"></textarea>
    </div>

    <div class="form-group">
      <label for="age">Age</label>
      <input type="number" id="age" formControlName="age">
    </div>

    <button type="submit" class="submit-btn">Save Changes</button>
  </form>

</div>


  <button (click)="logOut()" class="logout-btn">LogOut</button>
